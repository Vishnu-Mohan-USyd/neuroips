# Sweep dual_2_4_2: Phase 2.4.2 — same fix, gentler hyperparameters.
#
# Context (Task #14 from Phase 2.4.1 verdict):
#   Phase 2.4.1 (freeze-bug fix + lambda=2.0 + lr_mult=10) worked structurally:
#     * alpha_net was actually trainable (commit cde523f) — regression test
#       tests/test_training.py::test_unfreeze_stage2_reenables_alpha_net_after_blanket_freeze
#     * dry_run_phase_2_4.py showed alpha_net learning (Δw=0.150 in 50 steps,
#       g_E: 0.990→0.829, routine_shape trending negative)
#   BUT the hyperparameters λ_routine_shape=2.0 and lr_mult_alpha=10 were
#   CALIBRATED under the buggy frozen-gate regime (where the gate couldn't
#   move, so the optimizer just pushed energy down via other channels).
#   Once the gate actually moves, those same parameters are too aggressive:
#     step 2900: energy=6.7, ang_err=18.8
#     step 3000: energy=8.96, ang_err=20.2
#     step 3100: energy=10.75, ang_err=25.4   ← runaway peak
#     step 3200: energy=5.68, ang_err=16.4    ← snapback
#     step 3300: energy=7.97, ang_err=18.4    ← oscillating
#   Focused orientation coding distorted (ang_err drifting up from ~18° → 25°).
#
# Phase 2.4.2 intervention (two scalar changes, everything else identical):
#   1. lambda_routine_shape: 2.0 → 1.0  (half the routine_shape loss weight)
#   2. lr_mult_alpha:       10.0 → 5.0  (half the alpha_net LR multiplier)
#
#   alpha_lr = stage2_lr_v2 * lr_mult_alpha = 3e-4 * 5 = 1.5e-3  (was 3e-3)
#
#   Rationale: the Phase 2.4.1 runaway shows the gradient toward the routine
#   E/I split is strong enough on its own — we don't need 2× lambda to overcome
#   the debugger E4 counter-gradient, because the now-unfrozen gate reaches
#   the right basin anyway. Halving both knobs keeps the incentive structure
#   intact while giving the rest of the loss (sensory, homeo, v2 stability)
#   time to co-adapt instead of being steamrolled by the gate's fast descent.
#
# Preregistered gates (unchanged from Phase 1A/2/2.4/2.4.1):
#     m7_focused        > +0.03
#     m7_routine        < −0.03
#     |focused−routine| > +0.06
#     m10_amp_routine   < 0.9
#
# Decision tree for the Phase 2.4.2 verdict:
#   - 4/4 PASS + stable training (no energy runaway, ang_err stable) → success
#   - 4/4 PASS + still some runaway → bump lambda back up but cap energy term
#   - 3/4 PASS with gate differentiating (g_E_routine < 0.7, g_I_routine > 1.3)
#       but m7_routine miss → maybe lambda was too soft, nudge to 1.5
#   - 2/4 PASS + gate at identity → debugger activation (shouldn't happen
#     post-freeze-fix)
#   - Any gate moves wrong direction → debugger activation

model:
  n_orientations: 36
  orientation_range: 180.0
  sigma_ff: 12.0
  tau_l4: 5
  tau_adaptation: 200
  alpha_adaptation: 0.3
  adaptation_clamp: 10.0
  naka_rushton_n: 2.0
  naka_rushton_c50: 0.3
  tau_pv: 5
  sigma_norm: 1.0
  tau_l23: 10
  sigma_rec: 15.0
  gain_rec: 0.3
  tau_som: 10
  v2_hidden_dim: 16
  v2_input_mode: l4_l23
  pi_max: 5.0
  feedback_mode: "emergent"
  transition_step: 5.0
  dt: 1
  use_ei_gate: true

training:
  stage1:
    n_steps: 2000
    lr: 1.0e-3
    contrast_range: [0.1, 1.0]

  stage2:
    n_steps: 5000
    lr_v2: 3.0e-4
    lr_feedback: 1.0e-4
    weight_decay: 1.0e-4
    warmup_steps: 500
    burnin_steps: 1000    # inherit Phase 2 schedule
    ramp_steps: 1000      # inherit Phase 2 schedule
    gradient_clip: 1.0
    contrast_range: [0.15, 1.0]
    ambiguous_fraction: 0.3
    lr_mult_alpha: 5.0    # Phase 2.4.2 — HALVED from 10.0 after Phase 2.4.1
                          # runaway (ang_err 18→25, energy 6.7→10.7). The
                          # post-freeze-fix gate moves fast enough at 5×.

  # Baseline lambdas — IDENTICAL to sweep_dual_2.yaml (which itself is
  # identical to sweep_dual_1b.yaml for these terms).
  lambda_sensory: 0.5
  lambda_l4_sensory: 0.0
  lambda_mismatch: 0.0
  lambda_pred: 0.0
  lambda_energy: 1.5
  lambda_homeo: 1.0
  lambda_state: 1.0
  lambda_fb_energy: 0.5
  lambda_local_disc: 0.5
  lambda_pred_suppress: 0.5
  lambda_sharp: 0.5
  lambda_routine_shape: 1.0   # Phase 2.4.2 — HALVED from 2.0 after Phase 2.4.1
                              # runaway. Original bump 1.0 → 2.0 (Phase 2.4
                              # MOD 1) was calibrated under the FROZEN gate
                              # regime where the optimizer had to cheat its
                              # way to the right answer via other channels.
                              # Once unfrozen, the gate reaches the correct
                              # basin without the 2× weight, and 2× just
                              # destabilizes the rest of Stage 2.
  l23_energy_weight: 1.0
  freeze_v2: false
  oracle_pi: 3.0
  oracle_template: "oracle_true"
  oracle_shift_timing: true
  stimulus_noise: 0.25

  batch_size: 32
  seq_length: 25
  steps_on: 12
  steps_isi: 4
  n_seeds: 5

  # Phase 1B per-sample loss routing + Phase 2.4 routine_shape key.
  # Focused: routine_shape = 0.0 (not applied).
  # Routine: routine_shape = 2.0 (routing cancels half-batch mean).
  # Total effective weight on routine_shape for routine samples:
  #   lambda_routine_shape * routing.routine.routine_shape * 0.5 (half batch)
  #   = 1.0 * 2.0 * 0.5 = 1.0 * mean_over_routine(shape)
  #   (vs. Phase 2.4: 2.0 * 2.0 * 0.5 = 2.0 * mean_over_routine(shape))
  task_routing:
    focused:
      sensory: 2.0         # effective sensory       = 1.0
      energy:  0.33        # effective r_l23_energy  = 0.5
      fb_energy: 0.0       # effective fb_energy     = 0.0
      sharp: 2.0           # effective sharp         = 1.0
      local_disc: 2.0      # effective local_disc    = 1.0
      pred_suppress: 0.0   # effective pred_suppress = 0.0
      routine_shape: 0.0   # not applied to focused
    routine:
      sensory: 0.2         # effective sensory       = 0.1
      energy:  1.67        # effective r_l23_energy  = 2.5
      fb_energy: 2.0       # effective fb_energy     = 1.0
      sharp: 0.0           # effective sharp         = 0.0
      local_disc: 0.0      # effective local_disc    = 0.0
      pred_suppress: 2.0   # effective pred_suppress = 1.0
      routine_shape: 2.0   # applied only to routine (routing unchanged;
                           #   the effective weight drop comes entirely
                           #   from lambda_routine_shape 2.0 → 1.0)

stimulus:
  n_states: 2
  p_transition_cw: 0.80
  p_transition_ccw: 0.80
  p_self: 0.95
  n_anchors: 12
  jitter_range: 0.0
  transition_step: 5.0
  ambiguous_offset: 15.0
  cue_valid_fraction: 0.75
  cue_dim: 2
  task_state_dim: 2
