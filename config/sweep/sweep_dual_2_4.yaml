# Sweep dual_2_4: Phase 2.4 — routine E/I symmetry-break loss + alpha_net LR boost.
#
# Context (from Phase 2 verdict + debugger evidence on seed=42 checkpoint):
#   Phase 2 (causal E/I gate only):
#       PARTIAL, 2/4 gates, m7_diff +0.096
#       alpha_net stuck at identity: g_E_* ∈ [0.990, 1.002], g_I_* ∈ [1.032, 1.042]
#       std=0.000 per regime; Δg_E(focused-routine) = +0.0038 (directionally
#       right, quantitatively ~10× too small)
#
# Debugger confirmed root cause (seed=42):
#   H4 CONFIRMED — loss landscape ACTIVELY PENALIZES gate differentiation.
#     Trained loss      = 2.9916
#     Identity loss     = 3.0034  (Δ vs trained = +0.0118)
#     "Perfect" gate loss = 3.0253  (Δ vs identity = +0.0219)
#     → Δ from identity toward a (g_E=0.2, g_I=1.8) "perfect" routine gate
#       is +0.022 in the current loss → gradient descent actively moves
#       AWAY from the hypothesized optimum. The existing lambda_fb_energy
#       term penalizes |center_exc| symmetrically (it penalizes absolute
#       magnitude of feedback, not E/I asymmetry), so the gate has a
#       mechanism but no reward.
#   H2 CONFIRMED (secondary) — LR on the 8-param alpha_net is too slow.
#     LR×100 over 50 steps produces 84× weight drift and 7.4× more regime
#     differentiation vs. default LR, but still converges to the wrong
#     local minimum because the loss doesn't reward the right direction.
#
# Phase 2.4 intervention (TWO simultaneous changes):
#
#   1. Add new loss term `routine_shape`, applied ONLY to routine samples
#      via task_routing['routine']['routine_shape'] = 2.0:
#
#          shape_per_sample = |center_exc|.mean(T,N) - 0.5 * |som_drive_fb|.mean(T,N)
#          l_routine_shape  = (shape_per_sample * w_routine_shape).mean()
#          total += lambda_routine_shape * l_routine_shape
#
#      At lambda_routine_shape = 1.0 and the measured |center_exc|_routine ≈
#      0.033, driving routine from identity (g_E=1) toward perfect (g_E=0.2)
#      reduces center_exc by ~80% → Δ(l_routine_shape) ≈ −0.026, which
#      exceeds the +0.022 counter-gradient from the existing loss. Net Δ
#      toward perfect ≈ −0.004 → the gradient now points in the right
#      direction. Marginal but correctly oriented.
#
#      Biological motivation: expectation suppression via SOM-mediated
#      dendritic inhibition. The expected/routine stimulus should trigger
#      top-down inhibition, not direct excitation. The new term gives the
#      gate a reason to route routine feedback through the I-branch.
#
#   2. Apply lr_mult_alpha = 10.0 to the alpha_net param group:
#         alpha_lr = stage2_lr_v2 * 10 = 3e-4 * 10 = 3e-3
#      Debugger showed LR×100 was overly aggressive (weight drift 1.08 in
#      50 steps). 10× is enough to get alpha_net moving without instability.
#
# Preregistered gates (unchanged from Phase 1A):
#     m7_focused        > +0.03
#     m7_routine        < −0.03
#     |focused−routine| > +0.06
#     m10_amp_routine   < 0.9
#
# Decision tree for the Phase 2.4 verdict:
#   - 4/4 PASS → success, close out
#   - 3/4 PASS with narrow miss → Phase 2.5 bump lambda_routine_shape to 2.0
#   - 2/4 PASS + gate differentiates (g_E_routine < 0.7, g_I_routine > 1.3)
#       → Phase 2.5 bump lambda
#   - 2/4 PASS + gate STILL at identity → debugger activation
#   - Any gate moves wrong direction → debugger activation

model:
  n_orientations: 36
  orientation_range: 180.0
  sigma_ff: 12.0
  tau_l4: 5
  tau_adaptation: 200
  alpha_adaptation: 0.3
  adaptation_clamp: 10.0
  naka_rushton_n: 2.0
  naka_rushton_c50: 0.3
  tau_pv: 5
  sigma_norm: 1.0
  tau_l23: 10
  sigma_rec: 15.0
  gain_rec: 0.3
  tau_som: 10
  v2_hidden_dim: 16
  v2_input_mode: l4_l23
  pi_max: 5.0
  feedback_mode: "emergent"
  transition_step: 5.0
  dt: 1
  use_ei_gate: true

training:
  stage1:
    n_steps: 2000
    lr: 1.0e-3
    contrast_range: [0.1, 1.0]

  stage2:
    n_steps: 5000
    lr_v2: 3.0e-4
    lr_feedback: 1.0e-4
    weight_decay: 1.0e-4
    warmup_steps: 500
    burnin_steps: 1000    # inherit Phase 2 schedule
    ramp_steps: 1000      # inherit Phase 2 schedule
    gradient_clip: 1.0
    contrast_range: [0.15, 1.0]
    ambiguous_fraction: 0.3
    lr_mult_alpha: 10.0   # NEW (Phase 2.4) — 10× LR on alpha_net param group

  # Baseline lambdas — IDENTICAL to sweep_dual_2.yaml (which itself is
  # identical to sweep_dual_1b.yaml for these terms).
  lambda_sensory: 0.5
  lambda_l4_sensory: 0.0
  lambda_mismatch: 0.0
  lambda_pred: 0.0
  lambda_energy: 1.5
  lambda_homeo: 1.0
  lambda_state: 1.0
  lambda_fb_energy: 0.5
  lambda_local_disc: 0.5
  lambda_pred_suppress: 0.5
  lambda_sharp: 0.5
  lambda_routine_shape: 2.0   # NEW (Phase 2.4) — routine E/I symmetry-break incentive
                              #   MOD 1: bumped from 1.0 → 2.0 per team-lead to
                              #   compensate for per-batch mean() halving when
                              #   routine is ~50% of the batch; effective Δ
                              #   lifted from 0.013 → 0.026, above the 0.022
                              #   counter-gradient threshold from debugger E4.
  l23_energy_weight: 1.0
  freeze_v2: false
  oracle_pi: 3.0
  oracle_template: "oracle_true"
  oracle_shift_timing: true
  stimulus_noise: 0.25

  batch_size: 32
  seq_length: 25
  steps_on: 12
  steps_isi: 4
  n_seeds: 5

  # Phase 1B per-sample loss routing + NEW Phase 2.4 routine_shape key.
  # Focused: routine_shape = 0.0 (not applied).
  # Routine: routine_shape = 2.0 → at 50/50 batch, effective .mean(B)
  #          multiplier = 1.0 * mean_over_routine_samples(shape).
  task_routing:
    focused:
      sensory: 2.0         # effective sensory       = 1.0
      energy:  0.33        # effective r_l23_energy  = 0.5
      fb_energy: 0.0       # effective fb_energy     = 0.0
      sharp: 2.0           # effective sharp         = 1.0
      local_disc: 2.0      # effective local_disc    = 1.0
      pred_suppress: 0.0   # effective pred_suppress = 0.0
      routine_shape: 0.0   # NEW — not applied to focused
    routine:
      sensory: 0.2         # effective sensory       = 0.1
      energy:  1.67        # effective r_l23_energy  = 2.5
      fb_energy: 2.0       # effective fb_energy     = 1.0
      sharp: 0.0           # effective sharp         = 0.0
      local_disc: 0.0      # effective local_disc    = 0.0
      pred_suppress: 2.0   # effective pred_suppress = 1.0
      routine_shape: 2.0   # NEW — applied only to routine

stimulus:
  n_states: 2
  p_transition_cw: 0.80
  p_transition_ccw: 0.80
  p_self: 0.95
  n_anchors: 12
  jitter_range: 0.0
  transition_step: 5.0
  ambiguous_offset: 15.0
  cue_valid_fraction: 0.75
  cue_dim: 2
  task_state_dim: 2
