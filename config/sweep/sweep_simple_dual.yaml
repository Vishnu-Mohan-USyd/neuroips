# Simple-dual-regime: one network, Markov per-presentation task_state,
# three loss terms (sensory + mismatch + r_l23 energy), per-presentation
# task routing. Disables the Phase 2 E/I causal gate and zeros every
# lambda that isn't in the user's target spec.
#
# Target spec (user's literal form):
#   loss(b, s) = task_state[b,s,0] * (3.0 * sensory + 0.0 * mismatch + 1.0 * energy)
#              + task_state[b,s,1] * (0.3 * sensory + 1.0 * mismatch + 1.0 * energy)
#   task_state one-hot per (b, s), generated via Markov process with
#   p_switch = 0.2.
#
# Monitored metrics every 100 steps:
#   s_acc_rel, mm_acc_irr, s_acc_irr, mm_acc_rel
#
# Inherits sweep structure from sweep_dual_2_4_2.yaml (batch_size=32,
# seq_length=25, steps_on=12, steps_isi=4, n_orientations=36). Phase 2
# code (alpha_net, routine_shape loss) is retained but disabled via
# YAML-only zeroing so reverting is a single-file revert.

model:
  n_orientations: 36
  orientation_range: 180.0
  sigma_ff: 12.0
  tau_l4: 5
  tau_adaptation: 200
  alpha_adaptation: 0.3
  adaptation_clamp: 10.0
  naka_rushton_n: 2.0
  naka_rushton_c50: 0.3
  tau_pv: 5
  sigma_norm: 1.0
  tau_l23: 10
  sigma_rec: 15.0
  gain_rec: 0.3
  tau_som: 10
  v2_hidden_dim: 16
  v2_input_mode: l4_l23
  pi_max: 5.0
  feedback_mode: "emergent"
  transition_step: 5.0
  dt: 1
  use_ei_gate: false           # simple-dual: disable Phase 2 causal gate

training:
  stage1:
    n_steps: 2000
    lr: 1.0e-3
    contrast_range: [0.1, 1.0]

  stage2:
    n_steps: 5000
    lr_v2: 3.0e-4
    lr_feedback: 1.0e-4
    weight_decay: 1.0e-4
    warmup_steps: 500
    burnin_steps: 1000
    ramp_steps: 1000
    gradient_clip: 1.0
    contrast_range: [0.15, 1.0]
    ambiguous_fraction: 0.3
    lr_mult_alpha: 1.0         # no-op: alpha_net is gated off via use_ei_gate=false

  # Three-term loss per user spec. All other lambdas zeroed (Phase 2 code
  # retained, just disabled).
  lambda_sensory: 1.0
  lambda_mismatch: 1.0
  lambda_energy: 1.0
  lambda_homeo: 0.0            # zero per user spec (was 1.0 in Phase 2)
  lambda_state: 0.0            # zero per user spec (prior_kl was 1.0 in Phase 2)
  lambda_l4_sensory: 0.0
  lambda_pred: 0.0
  lambda_fb_energy: 0.0
  lambda_local_disc: 0.0
  lambda_pred_suppress: 0.0
  lambda_sharp: 0.0
  lambda_routine_shape: 0.0    # Phase 2.4 term disabled (no E/I gate)
  l23_energy_weight: 1.0
  freeze_v2: false
  oracle_pi: 3.0
  oracle_template: "oracle_true"
  oracle_shift_timing: true
  stimulus_noise: 0.25

  batch_size: 32
  seq_length: 25
  steps_on: 12
  steps_isi: 4
  n_seeds: 5

  # Per-presentation task routing (literal user spec).
  # Focused: 3.0 * sensory + 0.0 * mismatch + 1.0 * energy
  # Routine: 0.3 * sensory + 1.0 * mismatch + 1.0 * energy
  # Phase 2.4 keys (sharp/local_disc/pred_suppress/fb_energy/routine_shape)
  # set to 0.0 since their lambdas are 0 anyway — documented for clarity.
  task_routing:
    focused:
      sensory: 3.0
      mismatch: 0.0
      energy: 1.0
      fb_energy: 0.0
      sharp: 0.0
      local_disc: 0.0
      pred_suppress: 0.0
      routine_shape: 0.0
    routine:
      sensory: 0.3
      mismatch: 1.0
      energy: 1.0
      fb_energy: 0.0
      sharp: 0.0
      local_disc: 0.0
      pred_suppress: 0.0
      routine_shape: 0.0

stimulus:
  n_states: 2                  # CW/CCW only (no NEUTRAL); matches Phase 2
  p_transition_cw: 0.80
  p_transition_ccw: 0.80
  p_self: 0.95
  n_anchors: 12
  jitter_range: 0.0
  transition_step: 5.0         # matches 3° mismatch threshold
  ambiguous_offset: 15.0
  cue_valid_fraction: 0.75
  cue_dim: 2
  task_state_dim: 2
  task_p_switch: 0.2           # simple-dual: Markov per-presentation switch
