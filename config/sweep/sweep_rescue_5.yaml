# Rescue 5: shape-matched predictive suppression.
#
# On top of Rescue 1+2 (precision_gating + feature-specific expected_suppress +
# lambda_state=1.0). The ONLY delta from sweep_rescue_1_2.yaml:
#
#   use_shape_matched_prediction: true
#     → A fixed buffer T_stage1 ∈ R^{N×N} is calibrated once at the Stage 1 →
#       Stage 2 boundary. Row j = mean Stage-1 L2/3 response at orientation j
#       with FB=0 (sensory-basis tuning curve). At loss time, q_match =
#       q_pred @ T_stage1 replaces the raw softmax q_pred inside
#       expected_suppress_loss.
#
# Hypothesis: R1-R4 show expected < unexpected on BOTH activity AND decoding,
# with expected FWHM broader than unexpected. This is central clipping: the
# near-one-hot q_pred over-subtracts the peak of r_l23. Replacing q_pred with
# a shape-matched bump puts the suppression in the same feature basis as the
# sensory code, preserving peak while still suppressing predicted orientations.
#
# Explicitly DISABLED:
#   use_deep_template: false    — isolate the shape-matching from R4.
#   use_error_mismatch: false   — isolate the shape-matching from R4.
#   use_vip:            false   — isolate the shape-matching from R3.
#   use_ei_gate:        false   — Phase-2 gate not used.
#
# Everything else (lambdas, steps, seeds, task_routing, contrast, noise) is
# identical to sweep_rescue_1_2.yaml.

model:
  n_orientations: 36
  orientation_range: 180.0
  sigma_ff: 12.0
  tau_l4: 5
  tau_adaptation: 200
  alpha_adaptation: 0.3
  adaptation_clamp: 10.0
  naka_rushton_n: 2.0
  naka_rushton_c50: 0.3
  tau_pv: 5
  sigma_norm: 1.0
  tau_l23: 10
  sigma_rec: 15.0
  gain_rec: 0.3
  tau_som: 10
  v2_hidden_dim: 16
  v2_input_mode: l4_l23
  pi_max: 5.0
  feedback_mode: "emergent"
  transition_step: 5.0
  dt: 1
  use_ei_gate: false
  use_precision_gating: true             # R2 (inherited)
  use_vip: false                         # isolate R5 from R3
  use_deep_template: false               # isolate R5 from R4
  use_error_mismatch: false              # isolate R5 from R4
  use_shape_matched_prediction: true     # R5: project q_pred through T_stage1

training:
  stage1:
    n_steps: 2000
    lr: 1.0e-3
    contrast_range: [0.1, 1.0]

  stage2:
    n_steps: 5000
    lr_v2: 3.0e-4
    lr_feedback: 1.0e-4
    weight_decay: 1.0e-4
    warmup_steps: 500
    burnin_steps: 1000
    ramp_steps: 1000
    gradient_clip: 1.0
    contrast_range: [0.15, 1.0]
    ambiguous_fraction: 0.3
    lr_mult_alpha: 1.0

  lambda_sensory: 1.0
  lambda_mismatch: 1.0
  lambda_energy: 1.0
  lambda_homeo: 0.0
  lambda_state: 1.0              # prior_KL on for meaningful q_pred
  lambda_l4_sensory: 0.0
  lambda_pred: 0.0
  lambda_fb_energy: 0.0
  lambda_local_disc: 0.0
  lambda_pred_suppress: 0.0
  lambda_sharp: 0.0
  lambda_routine_shape: 0.0
  lambda_expected_suppress: 2.0  # R1 (feature-specific) — now uses q_match via R5
  l23_energy_weight: 1.0
  freeze_v2: false
  oracle_pi: 3.0
  oracle_template: "oracle_true"
  oracle_shift_timing: true
  stimulus_noise: 0.25

  batch_size: 32
  seq_length: 25
  steps_on: 12
  steps_isi: 4
  n_seeds: 5

  task_routing:
    focused:
      sensory: 3.0
      mismatch: 0.0
      energy: 1.0
      fb_energy: 0.0
      sharp: 0.0
      local_disc: 0.0
      pred_suppress: 0.0
      routine_shape: 0.0
    routine:
      sensory: 0.3
      mismatch: 1.0
      energy: 1.0
      fb_energy: 0.0
      sharp: 0.0
      local_disc: 0.0
      pred_suppress: 0.0
      routine_shape: 0.0

stimulus:
  n_states: 2
  p_transition_cw: 0.80
  p_transition_ccw: 0.80
  p_self: 0.95
  n_anchors: 12
  jitter_range: 0.0
  transition_step: 5.0
  ambiguous_offset: 15.0
  cue_valid_fraction: 0.75
  cue_dim: 2
  task_state_dim: 2
  task_p_switch: 0.2
