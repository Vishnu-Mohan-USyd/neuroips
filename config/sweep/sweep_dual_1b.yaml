# Sweep dual_1b: Phase 1B — Extended task_state routing across 3 more loss terms.
#
# Builds on Phase 1A (sweep_dual_1a):
#   * Per-sample routing infrastructure in CompositeLoss.forward() extended
#     to cover `sharp`, `local_disc`, `pred_suppress`.
#   * Baseline lambdas for those three terms ENABLED (Phase 1A had them at 0).
#
# Same architecture. Loss-side only. batch_size = 32 (matches e1/b1 baseline).
#
# Effective weights on each regime (lambda * task_routing multiplier):
#     focused  :
#         sensory       = 0.5 * 2.0  = 1.0
#         r_l23_energy  = 1.5 * 0.33 = 0.5
#         fb_energy     = 0.5 * 0.0  = 0.0
#         sharp         = 0.5 * 2.0  = 1.0   (Kok-style sharpening)
#         local_disc    = 0.5 * 2.0  = 1.0   (near-miss competitive pressure)
#         pred_suppress = 0.5 * 0.0  = 0.0   (focused DOES NOT suppress)
#     routine  :
#         sensory       = 0.5 * 0.2  = 0.1   (nonzero floor)
#         r_l23_energy  = 1.5 * 1.67 = 2.5
#         fb_energy     = 0.5 * 2.0  = 1.0
#         sharp         = 0.5 * 0.0  = 0.0
#         local_disc    = 0.5 * 0.0  = 0.0
#         pred_suppress = 0.5 * 2.0  = 1.0   (Richter-style dampening)
#
# Stage 2 schedule matches sweep_dual_1a (5000 / 1000 burn-in / 1000 ramp).

model:
  n_orientations: 36
  orientation_range: 180.0
  sigma_ff: 12.0
  tau_l4: 5
  tau_adaptation: 200
  alpha_adaptation: 0.3
  adaptation_clamp: 10.0
  naka_rushton_n: 2.0
  naka_rushton_c50: 0.3
  tau_pv: 5
  sigma_norm: 1.0
  tau_l23: 10
  sigma_rec: 15.0
  gain_rec: 0.3
  tau_som: 10
  v2_hidden_dim: 16
  v2_input_mode: l4_l23
  pi_max: 5.0
  feedback_mode: "emergent"
  transition_step: 5.0
  dt: 1

training:
  stage1:
    n_steps: 2000
    lr: 1.0e-3
    contrast_range: [0.1, 1.0]

  stage2:
    n_steps: 5000
    lr_v2: 3.0e-4
    lr_feedback: 1.0e-4
    weight_decay: 1.0e-4
    warmup_steps: 500
    burnin_steps: 1000   # CRITICAL: do not inherit the 5000 default.
    ramp_steps: 1000     # CRITICAL: do not inherit the 5000 default.
    gradient_clip: 1.0
    contrast_range: [0.15, 1.0]
    ambiguous_fraction: 0.3

  # Baseline lambdas — GLOBAL multipliers. Phase 1B ENABLES the three new
  # routed terms (sharp / local_disc / pred_suppress), all at 0.5 so that
  # combined with the routing multipliers they yield a 1.0 effective weight
  # on the regime that should use them.
  lambda_sensory: 0.5
  lambda_l4_sensory: 0.0
  lambda_mismatch: 0.0
  lambda_pred: 0.0
  lambda_energy: 1.5
  lambda_homeo: 1.0
  lambda_state: 1.0
  lambda_fb_energy: 0.5
  lambda_local_disc: 0.5    # ENABLED (was 0.0 in Phase 1A)
  lambda_pred_suppress: 0.5 # ENABLED
  lambda_sharp: 0.5         # ENABLED
  l23_energy_weight: 1.0
  freeze_v2: false
  oracle_pi: 3.0
  oracle_template: "oracle_true"
  oracle_shift_timing: true
  stimulus_noise: 0.25

  batch_size: 32    # CORRECTED — matches e1/b1 baseline (NOT the Phase 1A 64).
  seq_length: 25
  steps_on: 12
  steps_isi: 4
  n_seeds: 5

  # Phase 1B per-sample loss routing.
  # Extends the Phase 1A table with three new per-term multipliers applied
  # in CompositeLoss.forward() BEFORE the global lambda multipliers above.
  # Missing keys default to 0.0 (backward compat with Phase 1A configs).
  task_routing:
    focused:
      sensory: 2.0        # effective sensory      = 1.0
      energy:  0.33       # effective r_l23_energy = 0.5
      fb_energy: 0.0      # effective fb_energy    = 0.0
      sharp: 2.0          # effective sharp        = 1.0
      local_disc: 2.0     # effective local_disc   = 1.0
      pred_suppress: 0.0  # effective pred_suppress = 0.0 (focused does not dampen)
    routine:
      sensory: 0.2        # effective sensory      = 0.1
      energy:  1.67       # effective r_l23_energy = 2.5
      fb_energy: 2.0      # effective fb_energy    = 1.0
      sharp: 0.0          # effective sharp        = 0.0
      local_disc: 0.0     # effective local_disc   = 0.0
      pred_suppress: 2.0  # effective pred_suppress = 1.0 (routine dampens)

stimulus:
  n_states: 2
  p_transition_cw: 0.80
  p_transition_ccw: 0.80
  p_self: 0.95
  n_anchors: 12
  jitter_range: 0.0
  transition_step: 5.0
  ambiguous_offset: 15.0
  cue_valid_fraction: 0.75
  cue_dim: 2
  task_state_dim: 2
