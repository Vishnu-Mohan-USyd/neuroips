# ============================================================
# Template Manipulation: oracle_random (peaked but uncorrelated)
# ============================================================
# Parent: exp_deviance.yaml
# Change: oracle_template: oracle_random
# Purpose: Phase F1 diagnostic. Template is peaked with the same
#          bandwidth as oracle_true, but centered on a random
#          orientation drawn fresh per (batch, presentation). If
#          dampening still emerges, the peakedness of the template
#          is what matters, not its content/correctness.

model:
  n_orientations: 36
  orientation_range: 180.0
  sigma_ff: 12.0
  tau_l4: 5
  tau_adaptation: 200
  alpha_adaptation: 0.3
  adaptation_clamp: 10.0
  naka_rushton_n: 2.0
  naka_rushton_c50: 0.3
  tau_pv: 5
  sigma_norm: 1.0
  tau_l23: 10
  sigma_rec: 15.0
  gain_rec: 0.3
  tau_som: 10
  v2_hidden_dim: 16
  pi_max: 5.0
  template_gain: 1.0
  mechanism: "center_surround"
  feedback_mode: "emergent"
  transition_step: 15.0
  n_basis: 7
  dt: 1

training:
  stage1:
    n_steps: 2000
    lr: 1.0e-3
    contrast_range: [0.1, 1.0]

  stage2:
    n_steps: 5000
    lr_v2: 3.0e-4
    lr_feedback: 1.0e-4
    weight_decay: 1.0e-4
    warmup_steps: 500
    burnin_steps: 1000
    ramp_steps: 1000
    gradient_clip: 1.0
    contrast_range: [0.15, 1.0]
    ambiguous_fraction: 0.0

  lambda_sensory: 0.0                 # DISABLE L2/3 sensory readout
  lambda_l4_sensory: 1.0              # ENABLE L4 sensory readout
  lambda_mismatch: 1.0                # ENABLE L2/3 mismatch detection
  lambda_pred: 0.0
  lambda_energy: 0.01
  lambda_homeo: 1.0
  lambda_state: 0.0                   # Disabled: p_cw is placeholder in oracle mode
  lambda_fb: 0.0
  delta_som: true
  freeze_v2: true
  oracle_pi: 1.0
  oracle_template: oracle_random      # peaked but random center
  stimulus_noise: 0.1

  batch_size: 32
  seq_length: 25
  steps_on: 3
  steps_isi: 2
  n_seeds: 5

stimulus:
  n_states: 2
  p_transition_cw: 0.80
  p_transition_ccw: 0.80
  p_self: 0.95
  n_anchors: 12
  jitter_range: 0.0
  transition_step: 15.0
  cue_dim: 2
  task_state_dim: 2
