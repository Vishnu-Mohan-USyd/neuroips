# ============================================================
# Option B screen with persistent cue-gated apical gain
# ============================================================

model:
  n_orientations: 36
  orientation_range: 180.0
  sigma_ff: 12.0
  tau_l4: 5
  tau_adaptation: 200
  alpha_adaptation: 0.3
  adaptation_clamp: 10.0
  naka_rushton_n: 2.0
  naka_rushton_c50: 0.3
  tau_pv: 5
  sigma_norm: 1.0
  tau_l23: 10
  sigma_rec: 15.0
  gain_rec: 0.3
  tau_som: 10
  vip_enabled: true
  tau_vip: 10
  vip_gain: 0.35
  emergent_center_support_enabled: false
  emergent_center_support_gain: 0.12
  emergent_center_support_sigma: 5.0
  emergent_center_support_cue_gated: true
  emergent_recurrent_gain_enabled: false
  emergent_recurrent_gain_beta: 0.15
  emergent_recurrent_gain_sigma: 5.0
  emergent_recurrent_gain_cue_gated: true
  apical_gain_enabled: true
  apical_gain_beta: 0.08
  apical_gain_tau: 10
  apical_gain_sigma: 5.0
  apical_gain_mode: "persistent_sum"
  apical_gain_cue_gated: true
  v2_hidden_dim: 16
  pi_max: 5.0
  template_gain: 1.0
  mechanism: "center_surround"
  feedback_mode: "emergent"
  transition_step: 5.0
  n_basis: 7
  dt: 1

training:
  stage1:
    n_steps: 2000
    lr: 1.0e-3
    contrast_range: [0.1, 1.0]

  stage2:
    n_steps: 2000
    lr_v2: 3.0e-4
    lr_feedback: 1.0e-4
    weight_decay: 1.0e-4
    warmup_steps: 500
    burnin_steps: 0
    ramp_steps: 1
    gradient_clip: 1.0
    contrast_range: [0.15, 0.25]
    ambiguous_fraction: 0.3

  lambda_sensory: 0.5
  lambda_l4_sensory: 0.0
  lambda_mismatch: 0.0
  lambda_pred: 0.0
  lambda_energy: 0.0
  lambda_homeo: 1.0
  lambda_state: 0.0
  lambda_fb: 0.0
  lambda_sharp: 0.5
  lambda_local_disc: 1.0
  delta_som: true
  freeze_v2: true
  oracle_pi: 3.0
  oracle_template: "oracle_true"
  oracle_sigma: 8.0
  oracle_shift_timing: true
  stimulus_noise: 0.0

  batch_size: 32
  seq_length: 25
  steps_on: 6
  steps_isi: 4
  n_seeds: 5

stimulus:
  n_states: 2
  p_transition_cw: 0.80
  p_transition_ccw: 0.80
  p_self: 0.95
  n_anchors: 12
  jitter_range: 0.0
  transition_step: 5.0
  cue_dim: 2
  task_state_dim: 2
  cue_mode: "current"
  cue_contrast: 1.0
  cue_prestimulus_steps: 4
  ambiguous_offset: 10.0
  ambiguous_mode: "symmetric_local_competitor"
